<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Nunito:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <title>Cotação Dólar</title>
</head>
<body>
  <div class="background-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="container">
      <div class="card glass">
        <header class="card-header">
          <div class="icon-wrapper">
            <i class="ri-money-dollar-circle-line"></i>
          </div>
          <h1>Cotação do Dólar</h1>
          <p class="subtitle">Taxa de câmbio atualizada</p>
        </header>
        
        <div class="card-body">
          <div class="currency-display">
            <span class="currency-symbol">R$</span>
            <span id="dolar" class="currency-value">--,--</span>
          </div>
          <div class="status-badge" id="status-badge">
            <span class="dot"></span>
            <span id="update-time">Atualizando...</span>
          </div>
        </div>

        <footer class="card-footer">
          <button id="refresh-btn" class="btn-refresh">
            <i class="ri-refresh-line"></i> <span>Atualizar</span>
          </button>
        </footer>
      </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
